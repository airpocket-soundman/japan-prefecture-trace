<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#1976d2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="県の形">
<title>県の形 - 日本地図なぞりゲーム</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>県の形 <span class="version" aria-label="バージョン">v1.0.2</span></h1>
    <p class="subtitle">指定された県の<strong>内陸の県境</strong>を白地図上になぞってください</p>
    <div class="task">
      <span class="task-label">お題</span>
      <span id="prefName" class="pref-name">読み込み中...</span>
    </div>
    <div id="message" class="message"></div>
  </header>
  <main>
    <svg id="map" viewBox="0 0 900 700" preserveAspectRatio="xMidYMid meet" overflow="hidden" role="img" aria-label="日本白地図">
      <rect id="capture" x="0" y="0" width="900" height="700" fill="transparent"/>
      <g id="content">
        <g id="layer-base"></g>
        <g id="layer-answer"></g>
        <g id="layer-user"></g>
      </g>
    </svg>
    <div class="map-controls">
      <div class="zoom-group">
        <button id="btn-zoom-in" type="button" class="map-btn" title="拡大">＋</button>
        <button id="btn-zoom-out" type="button" class="map-btn" title="縮小">−</button>
        <button id="btn-zoom-reset" type="button" class="map-btn" title="リセット">⟲</button>
      </div>
    </div>
  </main>
  <footer>
    <div class="controls">
      <button id="btn-pen" type="button" class="pen-on" title="ペンの有効/無効を切替 (P)">
        <span class="pen-icon">✎</span><span class="pen-label">ペン ON</span>
      </button>
      <button id="btn-undo" type="button">取り消し</button>
      <button id="btn-clear" type="button">クリア</button>
      <button id="btn-submit" type="button" class="primary">判定する</button>
      <button id="btn-next" type="button" class="primary" hidden>次の問題</button>
    </div>
    <div id="score" class="score" hidden></div>
    <div class="legend">
      <span class="legend-item"><span class="swatch user"></span>あなたの線</span>
      <span class="legend-item"><span class="swatch answer"></span>正解の県境</span>
    </div>
    <p class="hint">
      ヒント：海に面した部分（海岸線）はなぞる必要はありません。隣の県との境界線だけを引きます。<br>
      ペンOFFで指1本パン／ピンチで拡大縮小／マウスホイールでも拡大縮小ができます（<kbd>P</kbd>でペン切替）。
    </p>
  </footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
<script src="app.js"></script>
</body>
</html>
